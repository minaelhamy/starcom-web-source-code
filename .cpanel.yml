---
deployment:
  tasks:
    - /bin/mkdir -p /home/shargtvh/starcom-web-source-code
    - /bin/mkdir -p /home/shargtvh/starcom-web-source-code/bootstrap/cache
    - /bin/mkdir -p /home/shargtvh/starcom-web-source-code/storage/framework/cache
    - /bin/mkdir -p /home/shargtvh/starcom-web-source-code/storage/framework/sessions
    - /bin/mkdir -p /home/shargtvh/starcom-web-source-code/storage/framework/views
    - /bin/mkdir -p /home/shargtvh/starcom-web-source-code/storage/logs
    - /usr/bin/rsync -a --delete --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r --exclude '.git' --exclude '.github' --exclude '.cpanel.yml' --exclude '.DS_Store' --exclude '.env' --exclude '.env.local' --exclude '.env.production' --exclude 'AGENTS.md' --exclude 'vendor/' --exclude 'node_modules/' --exclude 'bootstrap/cache/' --exclude 'storage/' --exclude 'public/storage/' --exclude 'public/file/' --exclude 'error_log' --exclude 'php/error_log' "./starcom webstore/" /home/shargtvh/starcom-web-source-code/
    - /bin/chmod -R 775 /home/shargtvh/starcom-web-source-code/bootstrap/cache /home/shargtvh/starcom-web-source-code/storage
    - /bin/bash -lc 'cd /home/shargtvh/starcom-web-source-code && composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist'
    - /bin/bash -lc 'cd /home/shargtvh/starcom-web-source-code && php artisan optimize:clear'
    - /bin/bash -lc 'cd /home/shargtvh/starcom-web-source-code && php artisan migrate --force'
    - /bin/bash -lc 'cd /home/shargtvh/starcom-web-source-code && php artisan storage:link'
    - /bin/bash -lc 'cd /home/shargtvh/starcom-web-source-code && php artisan config:cache'
    - /bin/bash -lc 'cd /home/shargtvh/starcom-web-source-code && php artisan route:cache'
    - /bin/bash -lc 'cd /home/shargtvh/starcom-web-source-code && php artisan view:cache'
